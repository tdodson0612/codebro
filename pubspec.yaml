name: programming_hub_clone
description: A Programming Hub clone app built with Flutter.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.18.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.0
  flutter_js: ^0.7.0
  webview_flutter: ^4.2.0
  http: ^0.13.6
  audioplayers: ^5.2.1
  flutter_animate: ^4.3.0
  provider: ^6.1.1
  google_fonts: ^4.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/